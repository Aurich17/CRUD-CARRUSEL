<form (ngSubmit)="save()">
<div class="form-group">
  <label for="fileName">Nombre del Archivo</label>
  <input type="text" class="form-cntrol" [(ngModel)]="mediaFile.fileName" name="fileName" required/>
</div>

<div class="form-group">
  <label for="fileName">Tipo de archivo</label>
  <input type="text" class="form-cntrol" [(ngModel)]="mediaFile.fileName" name="fileType" required/>
</div>

<button type="submit" class="btn btn-primary">Guardar</button>

</form>
